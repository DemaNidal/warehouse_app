{% from "macros.html" import csrf %}

{% extends "base.html" %}

{% block title %}
تعديل الموقع
{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
  <div class="d-flex align-items-center gap-3">
    <div class="stat-icon-box">
      <i class="bi bi-geo-alt fs-4"></i>
    </div>
    <div>
      <h2 class="mb-0">تعديل الموقع</h2>
      <small class="text-muted">{{ location.warehouse.name }}{% if location.location %} - {{ location.location }}{% endif %}</small>
    </div>
  </div>

  <a href="{{ url_for('product_details', product_id=location.product_id) }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right"></i> رجوع للمنتج
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <form method="POST" novalidate>
          {{ csrf() }}

          <div class="mb-3">
            <label class="form-label">الموقع</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-signpost"></i></span>
              <input
                type="text"
                name="location"
                value="{{ location.location or '' }}"
                class="form-control"
                placeholder="اتركه فارغًا لاستخدام اسم المستودع"
              >
            </div>
          </div>

          <hr class="my-4">

          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-success px-4">
              <i class="bi bi-check-lg"></i> حفظ
            </button>
            <a href="{{ url_for('product_details', product_id=location.product_id) }}" class="btn btn-light border">
              إلغاء
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
