{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-dark text-white">

        <h4 class="mb-0">
            <i class="bi bi-clock-history"></i>
            سجل النشاطات
        </h4>

    </div>

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-light">

                    <tr>

                        <th>#</th>

                        <th>المستخدم</th>

                        <th>العملية</th>

                        <th>التفاصيل</th>

                        <th>التاريخ</th>

                    </tr>

                </thead>

                <tbody>

                    {% for log in logs %}

                    <tr>

                        <td>{{ log.id }}</td>

                        <td>

                            <span class="badge bg-primary">

                                {{ log.user.username }}

                            </span>

                        </td>

                        <td>

                            <span class="badge bg-secondary">

                                {{ log.action }}

                            </span>

                        </td>

                        <td>

                            {{ log.description }}

                        </td>

                        <td>

                            {{ log.created_at.strftime('%Y-%m-%d %H:%M') }}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
