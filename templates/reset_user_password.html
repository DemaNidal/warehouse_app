{% from "macros.html" import csrf %}

{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
  <div class="d-flex align-items-center gap-3">
    <div class="stat-icon-box">
      <i class="bi bi-key-fill fs-4"></i>
    </div>
    <div>
      <h2 class="mb-0">إعادة تعيين كلمة المرور</h2>
      <small class="text-muted">المستخدم: <strong>{{ user.username }}</strong></small>
    </div>
  </div>

  <a href="{{ url_for('user_list') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right"></i> رجوع للمستخدمين
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <form method="POST" novalidate>
          {{ csrf() }}

          <div class="mb-3">
            <label class="form-label">كلمة المرور الجديدة</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                name="new_password"
                id="resetNewPassword"
                class="form-control"
                required
                minlength="6"
              >
              <button type="button" class="btn btn-outline-secondary" id="toggleResetPass" tabindex="-1">
                <i class="bi bi-eye" id="toggleResetPassIcon"></i>
              </button>
            </div>
            <div class="form-text">6 أحرف على الأقل</div>
          </div>

          <div class="mb-3">
            <label class="form-label">تأكيد كلمة المرور</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input
                type="password"
                name="confirm_password"
                id="resetConfirmPassword"
                class="form-control"
                required
                minlength="6"
              >
            </div>
            <div class="form-text text-danger d-none" id="resetPasswordMismatch">
              كلمتا المرور غير متطابقتين
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success px-4">
              <i class="bi bi-check-lg"></i> حفظ
            </button>
            <a href="{{ url_for('user_list') }}" class="btn btn-light border">
              إلغاء
            </a>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const toggleBtn = document.getElementById("toggleResetPass");
  const passwordInput = document.getElementById("resetNewPassword");
  const toggleIcon = document.getElementById("toggleResetPassIcon");

  toggleBtn.addEventListener("click", function () {
    const isHidden = passwordInput.type === "password";
    passwordInput.type = isHidden ? "text" : "password";
    toggleIcon.classList.toggle("bi-eye", !isHidden);
    toggleIcon.classList.toggle("bi-eye-slash", isHidden);
  });

  const confirmInput = document.getElementById("resetConfirmPassword");
  const mismatchHint = document.getElementById("resetPasswordMismatch");

  function checkMatch() {
    const mismatch = confirmInput.value && confirmInput.value !== passwordInput.value;
    mismatchHint.classList.toggle("d-none", !mismatch);
    confirmInput.setCustomValidity(mismatch ? "كلمتا المرور غير متطابقتين" : "");
  }

  passwordInput.addEventListener("input", checkMatch);
  confirmInput.addEventListener("input", checkMatch);
});
</script>

{% endblock %}
