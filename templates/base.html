<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <title>{% block title %}{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">           <img
            src="{{ url_for('static', filename='icons/box.png') }}"
            width="28"
            height="28"
          /> نظام المستودعات </a>

        <div class="d-flex gap-2">
          <a class="btn btn-light" href="/dashboard"> لوحة التحكم </a>

          <a class="btn btn-warning" href="/add-product"> إضافة منتج </a>

          <a class="btn btn-outline-light" href="/add-color"> الألوان </a>
          <a class="btn btn-light" href="/products"> المنتجات </a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

{% endwith %}{% block content %} {% endblock %}</div>
  </body>
</html>
