{% extends "base.html" %}

{% block title %}
تسجيل الدخول
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-sm">

            <div class="card-body">

                <h3 class="mb-4">
                    تسجيل الدخول
                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label>
                            اسم المستخدم
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>
                            كلمة المرور
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        class="btn btn-primary w-100"
                    >
                        دخول
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
