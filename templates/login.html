{% from "macros.html" import csrf %}

{% extends "auth_base.html" %}

{% block title %}
تسجيل الدخول
{% endblock %}

{% block content %}

<div class="card auth-form-card shadow-sm">
    <div class="auth-card-body">

        <div class="auth-brand">
            <img src="{{ url_for('static', filename='icons/Logo.png') }}" alt="Logo">
            <div>
                <div class="auth-title">الابراهيم بلاست</div>
                <div class="auth-subtitle">سجل دخولك للمتابعة</div>
            </div>
        </div>

        <form method="POST">
            {{ csrf() }}

            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="اسم المستخدم"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="كلمة المرور"
                    required
                >
            </div>

            <button class="btn btn-primary w-100">
                دخول
            </button>
        </form>

        <div class="auth-note">
            فقط أدخل بياناتك ثم اضغط دخول.
        </div>

    </div>
</div>

{% endblock %}
