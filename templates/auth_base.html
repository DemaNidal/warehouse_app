<!doctype html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
        {% block title %}{% endblock %}
        | الابراهيم بلاست
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <style>
        body {
            background: #eef2f7;
            min-height: 100vh;
            color: #17213a;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .auth-form-card {
            width: min(100%, 560px);
            max-width: 560px;
            margin: 0 auto;
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 55px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .auth-card-body {
            padding: 2.2rem 2rem;
            background: white;
        }

        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            margin-bottom: 1.8rem;
        }

        .auth-brand img {
            height: 40px;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .auth-subtitle {
            color: #6b7280;
            font-size: 0.96rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 1rem 1rem;
        }

        .btn-primary {
            border-radius: 14px;
            padding: 0.95rem 1rem;
            font-size: 1rem;
        }

        .form-label {
            font-weight: 600;
        }

        .auth-note {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 1.2rem;
            text-align: center;
        }

        @media (max-width: 575px) {
            .auth-card-body {
                padding: 1.6rem 1.2rem;
            }

            .auth-title {
                font-size: 1.55rem;
            }
        }
    </style>

</head>

<body>

    <div class="auth-shell">
        <div class="container">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} shadow-sm rounded-3 mb-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}
            {% endblock %}

        </div>
    </div>

</body>
</html>
