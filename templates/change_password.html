{% from "macros.html" import csrf %}

{% extends "base.html" %}

{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
  <div class="d-flex align-items-center gap-3">
    <div class="stat-icon-box">
      <i class="bi bi-key-fill fs-4"></i>
    </div>
    <div>
      <h2 class="mb-0">تغيير كلمة المرور</h2>
      <small class="text-muted">حافظ على أمان حسابك بكلمة مرور قوية</small>
    </div>
  </div>

  <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right"></i> رجوع للملف الشخصي
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <form method="POST" novalidate>
          {{ csrf() }}

          <div class="mb-3">
            <label class="form-label">كلمة المرور الحالية</label>
            <input
              type="password"
              name="current_password"
              class="form-control"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label">كلمة المرور الجديدة</label>
            <input
              type="password"
              name="new_password"
              class="form-control"
              minlength="6"
              required
            >
          </div>

          <div class="mb-3">
            <label class="form-label">تأكيد كلمة المرور</label>
            <input
              type="password"
              name="confirm_password"
              class="form-control"
              minlength="6"
              required
            >
          </div>

          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success px-4">
              <i class="bi bi-check-lg"></i> حفظ
            </button>
            <a href="{{ url_for('profile') }}" class="btn btn-light border">
              إلغاء
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
