{% from "macros.html" import csrf %}

{% extends "base.html" %}

{% block title %}
تحويل بين المواقع
{% endblock %}

{% block content %}

<div class="card shadow-sm">
  <div class="card-body form-card">
    <div class="page-header">
      <div>
        <h2 class="page-title">تحويل مخزون</h2>
        <p class="page-description mb-0">نقل كمية بين مواقع المنتج بدون تغيير الكمية الإجمالية.</p>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a href="/product/{{ product.id }}/add-location" class="btn btn-outline-primary">إضافة موقع جديد</a>
        <a href="/product/{{ product.id }}" class="btn btn-outline-secondary">رجوع إلى المنتج</a>
      </div>
    </div>

    <form method="POST">
      {{ csrf() }}
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">من الموقع</label>
          <select name="source_location_id" class="form-select" required>
            {% for location in locations %}
            <option value="{{ location.id }}">{{ location.warehouse.name }} - {{ location.location }} ({{ location.quantity }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">إلى الموقع</label>
          <select name="destination_location_id" class="form-select" required>
            {% for location in locations %}
            <option value="{{ location.id }}">{{ location.warehouse.name }} - {{ location.location }} ({{ location.quantity }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">الكمية</label>
          <input type="number" name="quantity" min="1" class="form-control" required>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">ملاحظات</label>
          <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
      </div>

      <div class="form-actions mt-4">
        <button type="submit" class="btn btn-info">تنفيذ التحويل</button>
        <a href="/product/{{ product.id }}" class="btn btn-secondary">رجوع</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
