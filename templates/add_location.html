{% from "macros.html" import csrf %}
{% extends "base.html" %}

{% block title %} إضافة موقع {% endblock %}

{% block content %}

<h2>{{ product.name }}</h2>

<hr />

<form method="POST">
  {{ csrf() }}

  <!-- Warehouse -->
  <div class="mb-3">
    <label class="form-label">المستودع</label>

    <select name="warehouse_id" class="form-select" required>
      {% for warehouse in warehouses %}
      <option value="{{ warehouse.id }}">
        {{ warehouse.name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <!-- Location (Optional) -->
  <div class="mb-3">
    <label class="form-label">
      الموقع
      <small class="text-muted">(اختياري)</small>
    </label>

    <input
      type="text"
      name="location"
      class="form-control"
      placeholder="مثال: رف 50 - خانة 2"
    />
  </div>

  <!-- Quantity -->
  <div class="mb-3">
    <label class="form-label">الكمية</label>

    <input
      type="number"
      name="quantity"
      class="form-control"
      min="0"
      required
    />
  </div>

  <button class="btn btn-success">
    حفظ
  </button>

</form>

{% endblock %}
