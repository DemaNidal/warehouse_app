{% from "macros.html" import csrf %}

{% extends "base.html" %}

{% block title %}
إضافة موقع
{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
  <div class="d-flex align-items-center gap-3">
    <div class="stat-icon-box">
      <i class="bi bi-geo-alt-fill fs-4"></i>
    </div>
    <div>
      <h2 class="mb-0">إضافة موقع جديد</h2>
      <small class="text-muted">{{ product.name }}</small>
    </div>
  </div>

  <a href="{{ url_for('product_details', product_id=product.id) }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right"></i> رجوع للمنتج
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <form method="POST" id="addLocationForm" novalidate>
          {{ csrf() }}

          <div class="mb-3">
            <label class="form-label">المستودع</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-building"></i></span>
              <select name="warehouse_id" class="form-select" required>
                {% for warehouse in warehouses %}
                <option value="{{ warehouse.id }}">{{ warehouse.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">الكمية</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-hash"></i></span>
              <input
                type="text"
                id="quantityExprInput"
                class="form-control"
                inputmode="decimal"
                autocomplete="off"
                placeholder="مثال: 1*25*625"
                required
              >
            </div>
            <div class="form-text" id="quantityResultText"></div>
            <input type="hidden" name="quantity" id="quantityHiddenInput">
            <input type="hidden" name="quantity_expression" id="quantityExpressionHidden">
          </div>

          <div class="mb-3">
            <label class="form-label">الموقع <small class="text-muted">(اختياري)</small></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-signpost"></i></span>
              <input
                type="text"
                name="location"
                class="form-control"
                placeholder="مثال: رف 50 - خانة 2 أو اتركه فارغًا لاستخدام اسم المستودع"
              >
            </div>
          </div>

          <hr class="my-4">

          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-success px-4">
              <i class="bi bi-check-lg"></i> حفظ
            </button>
            <a href="{{ url_for('product_details', product_id=product.id) }}" class="btn btn-light border">
              إلغاء
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  setupQuantityCalculator("quantityExprInput", "quantityHiddenInput", "quantityResultText", "quantityExpressionHidden");

  document.getElementById("addLocationForm").addEventListener("submit", function (e) {
    const quantityExprInput = document.getElementById("quantityExprInput");
    const quantityHiddenInput = document.getElementById("quantityHiddenInput");

    if (quantityHiddenInput.value === "" || parseInt(quantityHiddenInput.value, 10) < 0) {
      e.preventDefault();
      quantityExprInput.classList.add("is-invalid");
      quantityExprInput.focus();
    }
  });

});
</script>

{% endblock %}
