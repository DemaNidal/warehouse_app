{% from "macros.html" import csrf %}
{% extends "base.html" %}

{% block title %}إضافة موقع{% endblock %}

{% block content %}

<div class="card shadow-sm">
  <div class="card-body form-card">
    <div class="page-header">
      <div>
        <h2 class="page-title">إضافة موقع جديد</h2>
        <p class="page-description mb-0">أضف موقع تخزين جديدًا للمنتج {{ product.name }} مع الكمية المبدئية.</p>
      </div>
      <a href="/product/{{ product.id }}" class="btn btn-outline-secondary">رجوع للمنتج</a>
    </div>

    <form method="POST">
      {{ csrf() }}
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">المستودع</label>
          <select name="warehouse_id" class="form-select" required>
            {% for warehouse in warehouses %}
            <option value="{{ warehouse.id }}">{{ warehouse.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">الكمية</label>
          <input type="number" name="quantity" class="form-control" min="0" required />
        </div>

        <div class="col-12">
          <label class="form-label">الموقع <small class="text-muted">(اختياري)</small></label>
          <input type="text" name="location" class="form-control" placeholder="مثال: رف 50 - خانة 2" />
        </div>
      </div>

      <div class="form-actions mt-4">
        <button type="submit" class="btn btn-success">حفظ</button>
        <a href="/product/{{ product.id }}" class="btn btn-secondary">إلغاء</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
